---
layout: default
title: Photos
permalink: /photos/
---

<section class="photo-page">
  <header class="photo-page-header">
    <h1 class="text-3xl font-semibold tracking-normal text-gray-950">Photos</h1>
    <p class="mt-2 text-base text-gray-600">Favorite photos from the archive.</p>
  </header>

  <div class="photo-list">
    {% for photo in site.data.photos %}
      <article class="photo-entry">
        <figure>
          <div class="photo-frame">
            <img
              src="{{ photo.image }}"
              alt="{{ photo.alt | default: photo.title | escape }}"
            >
          </div>
          <figcaption class="photo-caption">
            <div class="photo-caption-header">
              <h2 class="text-2xl font-semibold text-gray-950">{{ photo.title }}</h2>
              {% if photo.date %}
                <time class="text-sm text-gray-500" datetime="{{ photo.date }}">
                  {{ photo.date | date: "%B %-d, %Y" }}
                </time>
              {% endif %}
            </div>

            {% if photo.commentary %}
              <p class="text-base leading-relaxed text-gray-700">{{ photo.commentary }}</p>
            {% endif %}

            <p class="photo-meta">
              {% if photo.camera %}
                <span>{{ photo.camera }}</span>
              {% endif %}
              {% if photo.focal_length %}
                <span>{{ photo.focal_length }}</span>
              {% endif %}
              {% if photo.iso %}
                <span>ISO {{ photo.iso }}</span>
              {% endif %}
              {% if photo.aperture %}
                <span>{{ photo.aperture }}</span>
              {% endif %}
              {% if photo.shutter_speed %}
                <span>{{ photo.shutter_speed }}</span>
              {% endif %}
            </p>
          </figcaption>
        </figure>
      </article>
    {% endfor %}
  </div>
</section>
