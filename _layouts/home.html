<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "Enrique" }}</title>
    <meta property="og:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta name="twitter:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.PNG">
    <style>
      :root {
        color: #000;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #fff;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        padding: clamp(2rem, 8vh, 4.5rem) 1rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.75rem, 9vw, 7rem);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
      }

      #animation-stage {
        width: min(58vw, 280px);
        height: min(58vw, 280px);
        margin: clamp(2rem, 6vh, 3.25rem) 0 clamp(1.75rem, 4vh, 2.5rem);
        overflow: visible;
      }

      #animation-stage canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      a {
        color: #000;
        font-size: clamp(1.35rem, 4vw, 2rem);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.12em;
      }

      a:focus-visible {
        outline: 2px solid #000;
        outline-offset: 0.25rem;
      }

      @media (prefers-reduced-motion: reduce) {
        #animation-stage {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Enrique</h1>
      <div id="animation-stage" aria-label="Random rotating animation" role="img"></div>
      <a href="/about/">About me</a>
    </main>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

      const container = document.querySelector("#animation-stage");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 5.4);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(0xffffff, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const blackLine = new THREE.LineBasicMaterial({ color: 0x000000 });
      const whiteFace = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.04,
        side: THREE.DoubleSide
      });

      function addWireframe(mesh, geometry) {
        mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geometry), blackLine));
      }

      function createD20() {
        const group = new THREE.Group();
        const geometry = new THREE.IcosahedronGeometry(1.55, 0);
        const die = new THREE.Mesh(geometry, whiteFace);
        addWireframe(die, geometry);
        group.add(die);

        return {
          label: "Spinning 20 sided die",
          object: group,
          tick: () => {
            group.rotation.x += 0.006;
            group.rotation.y += 0.012;
          }
        };
      }

      function createTorus() {
        const group = new THREE.Group();
        const geometry = new THREE.TorusGeometry(1.16, 0.36, 8, 24);
        const torus = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({
          color: 0x000000,
          wireframe: true
        }));
        group.add(torus);

        return {
          label: "Rotating wireframe torus",
          object: group,
          tick: () => {
            group.rotation.x += 0.008;
            group.rotation.y += 0.014;
          }
        };
      }

      function createCatHead() {
        const group = new THREE.Group();
        const catMaterial = new THREE.MeshBasicMaterial({
          color: 0xffffff,
          side: THREE.DoubleSide
        });

        const headGeometry = new THREE.IcosahedronGeometry(1.08, 1);
        const head = new THREE.Mesh(headGeometry, catMaterial);
        head.scale.set(1.18, 0.96, 0.92);
        addWireframe(head, headGeometry);
        group.add(head);

        const earGeometry = new THREE.ConeGeometry(0.38, 0.82, 3);
        const leftEar = new THREE.Mesh(earGeometry, catMaterial);
        leftEar.position.set(-0.7, 0.95, 0);
        leftEar.rotation.set(0, 0, 0.26);
        addWireframe(leftEar, earGeometry);
        group.add(leftEar);

        const rightEar = leftEar.clone();
        rightEar.position.x = 0.7;
        rightEar.rotation.z = -0.26;
        group.add(rightEar);

        const eyeGeometry = new THREE.OctahedronGeometry(0.09, 0);
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.36, 0.18, 0.9);
        leftEye.scale.set(1.15, 1.15, 0.35);
        group.add(leftEye);

        const rightEye = leftEye.clone();
        rightEye.position.x = 0.36;
        group.add(rightEye);

        const noseGeometry = new THREE.TetrahedronGeometry(0.13, 0);
        const nose = new THREE.Mesh(noseGeometry, eyeMaterial);
        nose.position.set(0, -0.1, 0.98);
        nose.rotation.z = Math.PI / 4;
        group.add(nose);

        group.rotation.x = -0.08;

        return {
          label: "Low poly cat head rotating",
          object: group,
          tick: () => {
            group.rotation.y += 0.011;
          }
        };
      }

      const animations = [createD20, createTorus, createCatHead];
      const selectedAnimation = animations[Math.floor(Math.random() * animations.length)]();
      container.setAttribute("aria-label", selectedAnimation.label);
      scene.add(selectedAnimation.object);

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      function resize() {
        const size = container.clientWidth;
        renderer.setSize(size, size);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }

      function animate() {
        if (!reducedMotion.matches) {
          selectedAnimation.tick();
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize);
      animate();
    </script>
  </body>
</html>
