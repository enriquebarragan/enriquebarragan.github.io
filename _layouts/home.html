<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "Enrique" }}</title>
    <meta property="og:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta name="twitter:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.PNG">
    <style>
      :root {
        color: #000;
        background: #fff;
        font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #fff;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        padding: clamp(2rem, 8vh, 4.5rem) 1rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.75rem, 9vw, 7rem);
        font-weight: 300;
        line-height: 1;
        letter-spacing: 0;
      }

      #animation-stage {
        width: min(72vw, 340px);
        height: min(72vw, 340px);
        margin: clamp(2rem, 6vh, 3.25rem) 0 0.8rem;
        overflow: visible;
      }

      #animation-stage canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      a {
        color: #000;
        font-size: clamp(1.35rem, 4vw, 2rem);
        font-weight: 300;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.12em;
      }

      a:focus-visible {
        outline: 2px solid #000;
        outline-offset: 0.25rem;
      }

      .model-credit {
        min-height: 1rem;
        max-width: min(84vw, 34rem);
        margin: 0 0 clamp(1.25rem, 4vh, 2.75rem);
        color: #666;
        font-size: 0.72rem;
        font-weight: 300;
        line-height: 1.35;
        text-align: center;
      }

      .home-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem 2rem;
      }

      @media (max-width: 640px) {
        .home-links {
          flex-direction: column;
          align-items: center;
          gap: 0.75rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #animation-stage {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Enrique</h1>
      <div id="animation-stage" aria-label="Random rotating animation" role="img"></div>
      <p id="model-credit" class="model-credit" aria-live="polite"></p>
      <nav class="home-links" aria-label="Primary">
        <a href="/about/">about</a>
        <a href="/contact/">contact</a>
      </nav>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { MeshoptDecoder } from "three/addons/libs/meshopt_decoder.module.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPixelatedPass } from "three/addons/postprocessing/RenderPixelatedPass.js";
      import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

      const container = document.querySelector("#animation-stage");
      const modelCredit = document.querySelector("#model-credit");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 6.8);
      const rotationSpeed = 1.55;

      const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
      renderer.setClearColor(0xffffff, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);

      const composer = new EffectComposer(renderer);
      const pixelatedPass = new RenderPixelatedPass(3, scene, camera);
      pixelatedPass.normalEdgeStrength = 0;
      pixelatedPass.depthEdgeStrength = 0;
      composer.addPass(pixelatedPass);
      composer.addPass(new OutputPass());

      scene.add(new THREE.AmbientLight(0xb6c7d9, 2.2));

      const keyLight = new THREE.DirectionalLight(0xffffff, 2.6);
      keyLight.position.set(2.5, 3.5, 4);
      keyLight.castShadow = true;
      scene.add(keyLight);

      const rimLight = new THREE.SpotLight(0x8fd3ff, 12, 8, Math.PI / 7, 0.35, 1.5);
      rimLight.position.set(-2.6, 1.2, 3.2);
      rimLight.castShadow = true;
      scene.add(rimLight);
      scene.add(rimLight.target);

      const fillMaterial = new THREE.MeshPhongMaterial({
        color: 0xf4fbff,
        emissive: 0x102033,
        emissiveIntensity: 0.08,
        shininess: 90,
        specular: 0xbde8ff,
        side: THREE.DoubleSide
      });

      const darkMaterial = new THREE.MeshPhongMaterial({
        color: 0x05080d,
        shininess: 60,
        specular: 0x9dc7ff
      });

      const gltfLoader = new GLTFLoader();
      gltfLoader.setMeshoptDecoder(MeshoptDecoder);
      const modelCache = new Map();

      function createD20() {
        const group = new THREE.Group();
        const geometry = new THREE.IcosahedronGeometry(1.55, 0);
        const die = new THREE.Mesh(geometry, fillMaterial);
        die.castShadow = true;
        die.receiveShadow = true;
        group.add(die);

        return {
          label: "Spinning 20 sided die",
          object: group,
          tick: (speed = 1) => {
            group.rotation.x += 0.006 * speed;
            group.rotation.y += 0.012 * speed;
          }
        };
      }

      function createTorus() {
        const group = new THREE.Group();
        const geometry = new THREE.TorusGeometry(1.16, 0.36, 12, 32);
        const torus = new THREE.Mesh(geometry, fillMaterial);
        torus.castShadow = true;
        torus.receiveShadow = true;
        group.add(torus);

        return {
          label: "Rotating filled torus",
          object: group,
          tick: (speed = 1) => {
            group.rotation.x += 0.008 * speed;
            group.rotation.y += 0.014 * speed;
          }
        };
      }

      function createSphere() {
        const group = new THREE.Group();
        const geometry = new THREE.SphereGeometry(1.42, 32, 20);
        const sphere = new THREE.Mesh(geometry, fillMaterial);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        group.add(sphere);

        return {
          label: "Perfect sphere rotating",
          object: group,
          tick: (speed = 1) => {
            group.rotation.y += 0.013 * speed;
          }
        };
      }

      function createCube() {
        const group = new THREE.Group();
        const geometry = new THREE.BoxGeometry(1.85, 1.85, 1.85, 1, 1, 1);
        const cube = new THREE.Mesh(geometry, fillMaterial);
        cube.castShadow = true;
        cube.receiveShadow = true;
        group.add(cube);
        group.rotation.set(0.18, 0.38, 0.08);

        return {
          label: "Rotating cube",
          object: group,
          tick: (speed = 1) => {
            group.rotation.x += 0.007 * speed;
            group.rotation.y += 0.01 * speed;
          }
        };
      }

      function createCrystal() {
        const group = new THREE.Group();
        const geometry = new THREE.OctahedronGeometry(1.55, 0);
        const crystal = new THREE.Mesh(geometry, fillMaterial);
        crystal.scale.set(0.86, 1.24, 0.86);
        crystal.castShadow = true;
        crystal.receiveShadow = true;
        group.add(crystal);

        return {
          label: "Octahedron crystal rotating",
          object: group,
          tick: (speed = 1) => {
            group.rotation.x += 0.006 * speed;
            group.rotation.y += 0.013 * speed;
          }
        };
      }

      function createPyramid() {
        const group = new THREE.Group();
        const geometry = new THREE.ConeGeometry(1.35, 2, 4);
        const pyramid = new THREE.Mesh(geometry, fillMaterial);
        pyramid.rotation.y = Math.PI / 4;
        pyramid.castShadow = true;
        pyramid.receiveShadow = true;
        group.add(pyramid);

        return {
          label: "Spinning pyramid",
          object: group,
          tick: (speed = 1) => {
            group.rotation.x += 0.006 * speed;
            group.rotation.y += 0.012 * speed;
          }
        };
      }

      function createUfo() {
        const group = new THREE.Group();

        const saucerGeometry = new THREE.SphereGeometry(1.45, 16, 8);
        const saucer = new THREE.Mesh(saucerGeometry, fillMaterial);
        saucer.scale.set(1.32, 0.24, 1.32);
        saucer.castShadow = true;
        saucer.receiveShadow = true;
        group.add(saucer);

        const domeGeometry = new THREE.SphereGeometry(0.72, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
        const dome = new THREE.Mesh(domeGeometry, fillMaterial);
        dome.position.y = 0.2;
        dome.scale.set(1, 0.78, 1);
        dome.castShadow = true;
        dome.receiveShadow = true;
        group.add(dome);

        const ringGeometry = new THREE.TorusGeometry(1.15, 0.08, 8, 24);
        const ring = new THREE.Mesh(ringGeometry, darkMaterial);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = -0.03;
        group.add(ring);

        group.rotation.x = 0.18;

        return {
          label: "Spinning UFO",
          object: group,
          tick: (speed = 1) => {
            group.rotation.y += 0.014 * speed;
          }
        };
      }

      function createCatHead() {
        const group = new THREE.Group();
        const catMaterial = fillMaterial;

        const headGeometry = new THREE.IcosahedronGeometry(1.08, 1);
        const head = new THREE.Mesh(headGeometry, catMaterial);
        head.scale.set(1.18, 0.96, 0.92);
        head.castShadow = true;
        head.receiveShadow = true;
        group.add(head);

        const earGeometry = new THREE.ConeGeometry(0.38, 0.82, 3);
        const leftEar = new THREE.Mesh(earGeometry, catMaterial);
        leftEar.position.set(-0.7, 0.95, 0);
        leftEar.rotation.set(0, 0, 0.26);
        leftEar.castShadow = true;
        leftEar.receiveShadow = true;
        group.add(leftEar);

        const rightEar = leftEar.clone();
        rightEar.position.x = 0.7;
        rightEar.rotation.z = -0.26;
        group.add(rightEar);

        group.rotation.x = -0.08;

        return {
          label: "Low poly cat head rotating",
          object: group,
          tick: (speed = 1) => {
            group.rotation.y += 0.011 * speed;
          }
        };
      }

      function loadModel(config) {
        if (!modelCache.has(config.path)) {
          const modelPromise = gltfLoader.loadAsync(config.path).then((gltf) => {
            const model = gltf.scene;
            const bounds = new THREE.Box3().setFromObject(model);
            const center = bounds.getCenter(new THREE.Vector3());
            const size = bounds.getSize(new THREE.Vector3());
            const maxAxis = Math.max(size.x, size.y, size.z);

            model.position.sub(center);
            model.scale.setScalar(maxAxis > 0 ? config.size / maxAxis : 1);
            model.rotation.set(config.rotation.x, config.rotation.y, config.rotation.z);

            model.traverse((child) => {
              if (!child.isMesh) {
                return;
              }

              if (!child.geometry.attributes.normal) {
                child.geometry.computeVertexNormals();
              }

              if (config.useSiteMaterial) {
                child.material = fillMaterial;
              }

              child.castShadow = true;
              child.receiveShadow = true;
            });

            return model;
          });

          modelCache.set(config.path, modelPromise);
        }

        return modelCache.get(config.path);
      }

      function createModelAnimation(config) {
        const group = new THREE.Group();
        const placeholder = new THREE.Mesh(new THREE.IcosahedronGeometry(0.8, 1), fillMaterial);
        placeholder.scale.set(1.08, 0.9, 0.86);
        placeholder.castShadow = true;
        placeholder.receiveShadow = true;
        group.add(placeholder);

        loadModel(config)
          .then((model) => {
            if (!group.parent) {
              return;
            }

            group.clear();
            group.add(model.clone(true));
          })
          .catch(() => {
            container.setAttribute("aria-label", `${config.label} failed to load`);
          });

        return {
          label: config.label,
          credit: config.credit || "",
          object: group,
          tick: (speed = 1) => {
            group.rotation.y += config.spin * speed;
          }
        };
      }

      const modelAnimations = [
        {
          label: "Rotating 3D Cheeto model",
          path: "/assets/3d/custom/cheeto.optimized.glb",
          size: 2.55,
          rotation: new THREE.Euler(-0.18, Math.PI, 0),
          spin: 0.011,
          useSiteMaterial: true
        },
        {
          label: "Rotating Dingus the Cat model",
          path: "/assets/3d/dingus_cat/dingus_cat.glb",
          size: 2.75,
          rotation: new THREE.Euler(-0.12, Math.PI, 0),
          spin: 0.011,
          useSiteMaterial: false,
          credit: '"Dingus the Cat" by alwayshasbean (CC BY 4.0), via Poly Pizza.'
        }
      ];

      const animations = [
        createD20,
        createTorus,
        createSphere,
        createCube,
        createCrystal,
        createPyramid,
        createUfo,
        createCatHead,
        ...modelAnimations.map((config) => () => createModelAnimation(config))
      ];
      let selectedIndex = Math.floor(Math.random() * animations.length);
      let selectedAnimation;

      function setAnimation(index) {
        if (selectedAnimation) {
          scene.remove(selectedAnimation.object);
        }

        selectedIndex = index;
        selectedAnimation = animations[selectedIndex]();
        container.setAttribute("aria-label", selectedAnimation.label);
        modelCredit.textContent = selectedAnimation.credit || "";
        scene.add(selectedAnimation.object);
        rimLight.target = selectedAnimation.object;
      }

      function advanceAnimation() {
        setAnimation((selectedIndex + 1) % animations.length);
      }

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      function resize() {
        const size = container.clientWidth;
        renderer.setSize(size, size);
        composer.setSize(size, size);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }

      function animate() {
        selectedAnimation.tick((reducedMotion.matches ? 0.35 : 1) * rotationSpeed);
        composer.render();
        requestAnimationFrame(animate);
      }

      resize();
      setAnimation(selectedIndex);
      window.addEventListener("resize", resize);
      document.addEventListener("click", (event) => {
        if (event.target.closest("a")) {
          return;
        }

        advanceAnimation();
      });
      animate();
    </script>
  </body>
</html>
