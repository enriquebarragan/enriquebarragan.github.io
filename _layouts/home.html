<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "Enrique" }}</title>
    <meta property="og:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title | default: 'Enrique' }}">
    <meta name="twitter:image" content="{{ '/assets/images/og-image.JPG' | absolute_url }}">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.PNG">
    <style>
      :root {
        color: #000;
        background: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #fff;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        padding: clamp(2rem, 8vh, 4.5rem) 1rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.75rem, 9vw, 7rem);
        font-weight: 400;
        line-height: 1;
        letter-spacing: 0;
      }

      #die {
        width: min(68vw, 360px);
        height: min(68vw, 360px);
        margin: clamp(2.5rem, 8vh, 4rem) 0 clamp(2rem, 5vh, 3rem);
      }

      a {
        color: #000;
        font-size: clamp(1.35rem, 4vw, 2rem);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.12em;
      }

      a:focus-visible {
        outline: 2px solid #000;
        outline-offset: 0.25rem;
      }

      @media (prefers-reduced-motion: reduce) {
        #die {
          transform: rotate(0deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Enrique</h1>
      <div id="die" aria-label="Spinning 20 sided die" role="img"></div>
      <a href="/about/">About me</a>
    </main>

    <script type="module">
      import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

      const container = document.querySelector("#die");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      camera.position.set(0, 0, 5.4);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(0xffffff, 0);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const geometry = new THREE.IcosahedronGeometry(1.8, 0);
      const faceMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.02,
        side: THREE.DoubleSide
      });
      const die = new THREE.Mesh(geometry, faceMaterial);
      scene.add(die);

      const edges = new THREE.EdgesGeometry(geometry);
      const wire = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0x000000 })
      );
      die.add(wire);

      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

      function resize() {
        const size = container.clientWidth;
        renderer.setSize(size, size, false);
        camera.aspect = 1;
        camera.updateProjectionMatrix();
      }

      function animate() {
        if (!reducedMotion.matches) {
          die.rotation.x += 0.006;
          die.rotation.y += 0.012;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      resize();
      window.addEventListener("resize", resize);
      animate();
    </script>
  </body>
</html>
