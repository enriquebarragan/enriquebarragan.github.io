<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: "Cards" }}</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div class="border-b border-slate-200 bg-white">
    {% include nav.html %}
  </div>

  <main class="mx-auto max-w-6xl px-4 py-8">
    {{ content }}

    <section class="mt-6">
      <div class="flex flex-col gap-3 rounded border border-slate-200 bg-white px-4 py-3 text-sm text-slate-600 sm:flex-row sm:items-center sm:justify-between">
        <div id="cards-status">Loading cards...</div>
        <label class="flex items-center gap-2 text-slate-700">
          <span class="text-xs uppercase tracking-wide text-slate-500">Sort</span>
          <select id="cards-sort" class="rounded border border-slate-300 bg-white px-2 py-1 text-sm text-slate-900">
            <option value="price-desc">Sale price high to low</option>
            <option value="price-asc">Sale price low to high</option>
            <option value="name-asc">Name A-Z</option>
            <option value="name-desc">Name Z-A</option>
          </select>
        </label>
      </div>
      <div id="cards-grid" class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    </section>
  </main>

  {% include footer.html %}

  <script>
    const currency = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 2
    });

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[character]));
    }

    function sortCards(cards, sortMode) {
      return [...cards].sort((left, right) => {
        if (sortMode === "name-asc") {
          return left.name.localeCompare(right.name);
        }

        if (sortMode === "name-desc") {
          return right.name.localeCompare(left.name);
        }

        if (sortMode === "price-asc") {
          return left.sale_price - right.sale_price || left.name.localeCompare(right.name);
        }

        return right.sale_price - left.sale_price || left.name.localeCompare(right.name);
      });
    }

    function renderPicturesLink(card) {
      if (!card.pictures_url) {
        return "";
      }

      return `
        <a href="${escapeHtml(card.pictures_url)}" class="inline-flex text-sm font-medium text-blue-700 hover:underline">
          pictures
        </a>
      `;
    }

    function renderCards(cards) {
      const availableCards = cards.filter((card) => !card.sold);
      const sortedCards = sortCards(availableCards, document.getElementById("cards-sort").value);
      const status = document.getElementById("cards-status");
      const grid = document.getElementById("cards-grid");

      status.textContent = `${availableCards.length} available cards`;

      grid.innerHTML = sortedCards.map((card) => `
        <article class="grid grid-cols-[80px_minmax(0,1fr)_64px] gap-3 rounded border border-slate-200 bg-white p-3 shadow-sm sm:grid-cols-[96px_minmax(0,1fr)_72px] sm:gap-4 sm:p-4">
          <a href="${escapeHtml(card.tcgplayer_url)}" target="_blank" rel="noopener" class="block">
            <img
              src="${escapeHtml(card.photo_url)}"
              alt="${escapeHtml(card.name)}"
              class="aspect-[3/4] w-20 rounded object-cover sm:w-24"
              loading="lazy"
            >
          </a>
          <div class="min-w-0">
            <h2 class="truncate text-base font-semibold text-slate-950">
              <a href="${escapeHtml(card.tcgplayer_url)}" target="_blank" rel="noopener" class="hover:underline">${escapeHtml(card.name)}</a>
            </h2>
            <p class="mt-1 text-sm text-slate-600">${escapeHtml(card.set_name)}</p>
            <dl class="mt-4 grid grid-cols-2 gap-3 text-sm">
              <div>
                <dt class="text-xs uppercase tracking-wide text-slate-500">Sale</dt>
                <dd class="font-medium">${currency.format(card.sale_price)}</dd>
              </div>
            </dl>
          </div>
          <div class="flex justify-end text-right">
            ${renderPicturesLink(card)}
          </div>
        </article>
      `).join("");
    }

    let allCards = [];

    fetch("/assets/data/cards.json")
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      })
      .then((cards) => {
        allCards = cards;
        renderCards(allCards);
        document.getElementById("cards-sort").addEventListener("change", () => renderCards(allCards));
      })
      .catch((error) => {
        document.getElementById("cards-status").textContent = `Could not load cards: ${error.message}`;
      });
  </script>
</body>
</html>
