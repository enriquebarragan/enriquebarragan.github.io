---
layout: default
---

<article class="my-8 space-y-6">
  <header class="border-b border-gray-300 pb-4">
    <p class="text-sm text-gray-500">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1 class="mt-1 text-3xl font-semibold tracking-normal text-gray-950">{{ page.title }}</h1>
  </header>

  <div class="space-y-4 text-base leading-relaxed text-gray-800">
    {{ content }}
  </div>

  <p class="border-t border-gray-200 pt-4 text-sm">
    <a class="font-semibold text-blue-700 underline" href="/blogs/">View all blog entries</a>
  </p>
</article>
